########################################
# NAME: YouTube Ads + Background + DualSubs Merge
# AUTHOR: Custom merge for Quantumult X
# NOTE:
# 1) 不要再同时启用 ddgksf YoutubeAds.conf 或 DualSubs.YouTube.snippet/plugin
# 2) 只启用本 conf
# 3) 把 merge.youtube.response.js 和本 conf 放在同一个 GitHub 仓库，按你的 raw URL 修改下方 MERGED_RESPONSE_JS
########################################

hostname = -redirector*.googlevideo.com, *.googlevideo.com, www.youtube.com, m.youtube.com, tv.youtube.com, music.youtube.com, s.youtube.com, youtubei.googleapis.com

# ======= 视频广告请求：保留 ddgksf/Maasea 规则 =======
^https?:\/\/[\w-]+\.googlevideo\.com\/(?!(dclk_video_ads|videoplayback\?)).+&oad url reject-200

# ======= DualSubs：player request 必须保留，否则字幕选项可能不完整 =======
^https?:\/\/(www|m|tv)\.youtube\.com\/youtubei\/v1\/player(\?.+)?$ url script-request-body https://github.com/DualSubs/YouTube/releases/latest/download/request.bundle.js
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/player(\?.+)?$ url script-request-body https://github.com/DualSubs/YouTube/releases/latest/download/request.bundle.js

# ======= 合并响应：同一个 player/get_watch 只进入这一个响应脚本 =======
# 将下面 URL 改成你自己 GitHub raw 地址：
# 例如：https://raw.githubusercontent.com/你的用户名/你的仓库/main/merge.youtube.response.js
^https?:\/\/(www|m|tv)\.youtube\.com\/youtubei\/v1\/player(\?.+)?$ url script-response-body https://raw.githubusercontent.com/YOUR_GITHUB_USERNAME/YOUR_REPO/main/merge.youtube.response.js
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/player(\?.+)?$ url script-response-body https://raw.githubusercontent.com/YOUR_GITHUB_USERNAME/YOUR_REPO/main/merge.youtube.response.js
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/get_watch(\?.+)?$ url script-response-body https://raw.githubusercontent.com/YOUR_GITHUB_USERNAME/YOUR_REPO/main/merge.youtube.response.js

# ======= YouTube 其它页面去广告：不含 player，避免再次冲突 =======
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/(browse|next|search|reel\/reel_watch_sequence|guide|account\/get_setting)(\?.+)?$ url script-response-body https://raw.githubusercontent.com/Maasea/sgmodule/refs/heads/master/Script/Youtube/youtube.response.js

# ======= DualSubs timedtext：字幕合成/翻译 =======
^https?:\/\/(www|m)\.youtube\.com\/api\/timedtext url script-request-header https://github.com/DualSubs/YouTube/releases/latest/download/request.bundle.js
^https?:\/\/(www|m)\.youtube\.com\/api\/timedtext\?(.*)subtype=(Official|External) url script-response-body https://github.com/DualSubs/Universal/releases/latest/download/Composite.Subtitles.response.bundle.js
^https?:\/\/(www|m)\.youtube\.com\/api\/timedtext\?(.*)subtype=Translate url script-response-body https://github.com/DualSubs/Universal/releases/latest/download/Translate.response.bundle.js

# ======= YouTube Music DualSubs，可按需删除 =======
^https?:\/\/music\.youtube\.com\/youtubei\/v1\/browse(\?.+)?$ url script-request-body https://github.com/DualSubs/YouTube/releases/latest/download/request.bundle.js
^https?:\/\/youtubei\.googleapis\.com\/youtubei\/v1\/browse\?(.*)subtype=Translate url script-response-body https://github.com/DualSubs/Universal/releases/latest/download/Translate.response.bundle.js

# ======= 通用广告请求 =======
^https?:\/\/(www|s)\.youtube\.com\/api\/stats\/ads url reject-200
^https?:\/\/(www|s)\.youtube\.com\/(pagead|ptracking) url reject-200
^https?:\/\/s\.youtube\.com\/api\/stats\/qoe\?adcontext url reject-200
